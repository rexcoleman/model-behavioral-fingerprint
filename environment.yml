name: model-fingerprint
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - pandas
  - pytest
  - pytest-cov
  - pyyaml
  - pip
